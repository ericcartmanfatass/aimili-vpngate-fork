<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>AimiliVPN Console · 全局控制台</title>
  <link rel="stylesheet" href="./static/console.css">
</head>
<body>
  <div class="glow-orb orb-left" aria-hidden="true"></div>
  <div class="glow-orb orb-right" aria-hidden="true"></div>
  <div class="app-shell">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3 4.5 6.2v5.1c0 4.5 3.1 8.5 7.5 9.7 4.4-1.2 7.5-5.2 7.5-9.7V6.2L12 3Z"/><path stroke-linecap="round" stroke-linejoin="round" d="m8.8 12 2.1 2.1 4.4-4.5"/></svg>
        </div>
        <div class="brand-copy">
          <h1>AimiliVPN <span>Console</span></h1>
          <p>GLOBAL VPNGATE ORCHESTRATION CENTER</p>
        </div>
      </div>
      <div class="header-actions">
        <span id="operationStatus" class="operation-status loading" aria-live="polite">正在加载…</span>
        <button type="button" data-console-action="logout">退出登录</button>
      </div>
    </header>
    <div class="wrap">
      <aside>
        <p class="sidebar-label">Managed instances</p>
        <div class="inst" id="instances"></div>
        <div class="card instance-manager" id="instanceManager"></div>
      </aside>
      <main>
        <nav class="tabs" aria-label="控制台页面">
          <button type="button" class="tab active" id="tabOverview" data-console-action="overview">总览</button>
          <span id="instanceTabs"></span>
        </nav>
        <section id="content" aria-live="polite"></section>
      </main>
    </div>
  </div>
  <script src="./static/console.js"></script>
</body>
</html>
